services:
  api:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: "8090"
      DB_PATH: /data/hube.db
      MONKEYAPI_URL: ${MONKEYAPI_URL:-}
      MONKEYAPI_KEY: ${MONKEYAPI_KEY:-}
    volumes:
      - db-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  web:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db-data:
